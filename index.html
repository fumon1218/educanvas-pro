<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      window.global = window;
      window.process = { env: {} };
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script>
      window.onerror = function (message, source, lineno, colno, error) {
        document.body.innerHTML += '<div style="color:red; padding: 20px; background: #fee; position: fixed; top: 0; left: 0; right: 0; z-index: 9999;">' + 
          '<b>Global Error:</b> ' + message + '<br/>' + source + ':' + lineno + '<br/><pre>' + (error && error.stack ? error.stack : '') + '</pre></div>';
      };
      window.addEventListener('unhandledrejection', function(event) {
        document.body.innerHTML += '<div style="color:red; padding: 20px; background: #fee; position: fixed; top: 100px; left: 0; right: 0; z-index: 9999;">' + 
          '<b>Unhandled Promise:</b> ' + event.reason + '</div>';
      });
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
